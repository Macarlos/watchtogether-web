<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch2Night — You're offline</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: linear-gradient(180deg, #14102a 0%, #08081a 100%);
    color: #f5f5f7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    box-sizing: border-box;
  }
  .emoji { font-size: 56px; margin-bottom: 8px; }
  h1 { font-size: 22px; margin: 0 0 8px; }
  p { font-size: 15px; line-height: 1.5; color: #c7c7d1; max-width: 320px; margin: 0 0 24px; }
  button {
    background: #ff5a5f;
    color: #fff;
    border: none;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
  }
  button:active { opacity: 0.85; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">🎞️</div>
    <h1>You're offline</h1>
    <p>Watch2Night needs an internet connection to fetch movies and shows. Reconnect and try again — your saved picks are still safe on this device.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
